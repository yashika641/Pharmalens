name: Deploy Backend to Hetzner

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🔄 Pulling latest backend code..."
            cd /app

            # Copy new backend files from git
            git -C /app/Pharmalens pull origin main 2>/dev/null || \
            git clone https://github.com/yashika641/Pharmalens.git /app/Pharmalens

            # Sync backend folder to /app/backend
            rsync -av --delete \
              --exclude='__pycache__' \
              --exclude='*.pyc' \
              --exclude='.env' \
              /app/Pharmalens/backend/ /app/backend/

            echo "📦 Installing dependencies..."
            source /app/venv/bin/activate
            pip install -r /app/backend/requirements.txt --quiet

            echo "🔁 Restarting backend service..."
            systemctl restart pharmalens

            echo "✅ Deployment complete!"